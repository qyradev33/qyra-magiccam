
name: Build QYRA MagicCam APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Gradle 9 and Create Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-9.0-bin.zip -O /tmp/gradle.zip
        unzip -q /tmp/gradle.zip -d /tmp/
        export GRADLE_HOME=/tmp/gradle-9.0
        export PATH=$GRADLE_HOME/bin:$PATH
        gradle wrapper --gradle-version 9.0
        rm -rf /tmp/gradle.zip /tmp/gradle-9.0

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QYRA-MagicCam-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
