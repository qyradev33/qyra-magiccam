name: Build QYRA MagicCam APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Fix SDK Path
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Create .env.example
      run: |
        echo "# QYRA MagicCam API Keys" > .env.example

    - name: Create Dummy google-services.json
      run: |
        mkdir -p app/src/debug app/src/main
        echo '{
          "project_info": {
            "project_number": "123456789",
            "project_id": "dummy-project",
            "storage_bucket": "dummy-project.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789:android:dummy",
                "android_client_info": {
                  "package_name": "com.example"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "dummy-key"
                }
              ],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }
          ],
          "configuration_version": "1"
        }' > app/google-services.json
        cp app/google-services.json app/src/debug/google-services.json
        cp app/google-services.json app/src/main/google-services.json

    - name: Create Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Install Gradle and Create Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O /tmp/gradle.zip
        sudo unzip -q /tmp/gradle.zip -d /opt/
        sudo ln -sf /opt/gradle-9.3.1/bin/gradle /usr/local/bin/gradle
        gradle wrapper --gradle-version 9.3.1

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QYRA-MagicCam-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
